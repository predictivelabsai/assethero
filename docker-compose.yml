# Coolify / production compose for the unified AssetHero web app (app.py).
# (docker-compose.yaml in this repo is the multi-service dev stack for the
#  legacy web_app.py / api / agui; this single-service file is the web deploy.)
#
# Coolify: Build Pack = Docker Compose, this file, domain -> assethero.chat.
# Landing serves with zero secrets; set the rest to enable login + chat.
services:
  assethero:
    build: .
    container_name: assethero
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENVIRONMENT=production
      - SESSION_SECRET=${SESSION_SECRET:-}
      - DATABASE_URL=${DATABASE_URL:-}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - ALPACA_PAPER_API_KEY=${ALPACA_PAPER_API_KEY:-}
      - ALPACA_PAPER_SECRET_KEY=${ALPACA_PAPER_SECRET_KEY:-}
      - MASSIVE_API_KEY=${MASSIVE_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - EODHD_API_KEY=${EODHD_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
